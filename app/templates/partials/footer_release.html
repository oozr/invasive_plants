{% if release_metadata and release_metadata.version %}
<p class="footer-release mb-1">
    Data release {{ release_metadata.version }}
    {% if release_metadata.date_label %}
        · {{ release_metadata.date_kind|capitalize }} {{ release_metadata.date_label }}
    {% endif %}
    · <a href="{{ url_for('method.index') }}#data-versions">Version history</a>
</p>
{% endif %}
