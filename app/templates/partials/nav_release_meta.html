{% if release_metadata and release_metadata.version %}
<li class="nav-item nav-release-item">
    <span class="nav-release-meta" aria-label="Dataset release">
        <strong>Data {{ release_metadata.version }}</strong>
        {% if release_metadata.date_label %}
            <span>{{ release_metadata.date_kind|capitalize }} {{ release_metadata.date_label }}</span>
        {% endif %}
    </span>
</li>
{% endif %}
